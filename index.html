<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revelación de Género</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= HERO ================= -->
  <section class="hero">
    <!-- Nubes -->
    <img src="assets/clouds.png" class="parallax cloud left" data-speed="0.15">
    <img src="assets/clouds.png" class="parallax cloud right" data-speed="0.25">

    <!-- Contenido -->
    <div class="content">
      <h1>Ruddy y Rocío</h1>
      <p>Revelación de género &amp; baby shower</p>
    </div>
  </section>

  <!-- ================= FECHA ================= -->
  <section class="fecha">
    <!-- Confeti -->
    <img src="assets/confetti.png" class="parallax confetti" data-speed="0.2">

    <div class="content">
      <h2>Sábado 14 de marzo</h2>
      <h3>16:00 PM</h3>
      <div id="countdown"></div>
    </div>
  </section>

  <!-- ================= UBICACIÓN ================= -->
  <section class="ubicacion">
    <!-- Globos -->
    <img src="assets/balloons.png" class="parallax balloons" data-speed="0.3">

    <div class="content">
      <h2>Ubicación</h2>
      <p>Calle Adrian Patiño #435</p>

      <a class="btn" href="https://maps.google.com" target="_blank">
        Ver ubicación
      </a>
    </div>
  </section>

  <!-- ================= MENSAJE FINAL ================= -->
  <section class="mensaje">
    <div class="content">
      <!-- Bebé / Osito -->
      <img src="assets/baby.png" class="reveal baby">

      <p>Tu presencia será el mejor regalo 💖</p>

      <a class="btn" href="https://wa.me/591XXXXXXXX">
        Confirmar asistencia
      </a>
    </div>
  </section>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
